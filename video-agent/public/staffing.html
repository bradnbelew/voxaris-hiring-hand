<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Jordan — Virtual Screening Interview</title>
    <style>
      :root {
        --bg: #0a0a0a;
        --fg: #f5f5f5;
        --muted: #9ca3af;
        --accent: #3498db;
        --panel: rgba(15, 15, 15, 0.78);
        --border: rgba(255, 255, 255, 0.08);
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
        overflow: hidden;
      }
      #root { position: fixed; inset: 0; }
      #call { position: absolute; inset: 0; background: #000; }
      #call iframe { width: 100%; height: 100%; border: 0; }

      #loading, #error {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 18px;
        padding: 32px;
        text-align: center;
      }
      #error { display: none; }

      .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid rgba(52, 152, 219, 0.25);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      h1 { font-size: 20px; margin: 0; font-weight: 600; letter-spacing: -0.01em; }
      p  { margin: 0; color: var(--muted); font-size: 14px; max-width: 460px; line-height: 1.5; }

      button {
        background: var(--accent);
        color: #04182a;
        border: 0;
        padding: 12px 24px;
        border-radius: 10px;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
      }
      button:hover { filter: brightness(1.05); }

      #bar {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 14px 20px calc(14px + env(safe-area-inset-bottom));
        background: var(--panel);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-top: 1px solid var(--border);
        display: none;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        font-size: 13px;
      }
      #bar.visible { display: flex; }
      #bar .role { font-weight: 600; }
      #bar .stage {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.04);
        color: var(--muted);
        font-size: 12px;
      }

      #toast {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        top: 24px;
        padding: 12px 18px;
        border-radius: 10px;
        background: rgba(46, 204, 113, 0.12);
        border: 1px solid rgba(46, 204, 113, 0.4);
        color: #6ee7b7;
        font-size: 13px;
        font-weight: 600;
        display: none;
      }
      #toast.visible { display: block; }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="loading">
        <div class="spinner"></div>
        <h1>Getting your interview ready…</h1>
        <p>Jordan is warming up. This takes just a few seconds.</p>
      </div>
      <div id="error">
        <h1 style="color:#f87171">Something went wrong</h1>
        <p id="errMsg">We couldn't start your interview. Please try again.</p>
        <button onclick="location.reload()">Try Again</button>
      </div>
      <div id="call"></div>
      <div id="toast">✅ Interview complete — check your email for next steps</div>
      <div id="bar">
        <div class="role" id="roleLabel">Loading role…</div>
        <div id="stage" class="stage">Stage: Introduction</div>
      </div>
    </div>

    <script>
      const qs = new URLSearchParams(location.search);
      const params = {
        candidate_name: qs.get("name") || "there",
        role: qs.get("role") || "general",
        agency_name: qs.get("agency") || "our staffing team",
      };

      let conversationId = null;
      let pollTimer = null;

      const STAGE_LABEL = {
        candidate_ready: "Stage: Introduction",
        get_candidate_info: "Stage: Contact Info",
        work_authorization: "Stage: Work Authorization",
        continue_screening: "Stage: Screening",
        get_experience: "Stage: Experience",
        get_certifications: "Stage: Certifications",
        get_availability: "Stage: Availability",
        physical_requirements: "Stage: Requirements Check",
        candidate_questions: "Stage: Candidate Q&A",
        closing_confirmed: "Stage: Complete",
        end_screening_ineligible: "Stage: Ended",
      };

      function show(id) {
        ["loading", "error", "call"].forEach((el) => {
          const node = document.getElementById(el);
          node.style.display = el === id ? (el === "call" ? "block" : "flex") : "none";
        });
      }
      function showError(msg) {
        document.getElementById("errMsg").textContent = msg || "Unknown error";
        show("error");
      }
      function embed(url) {
        const holder = document.getElementById("call");
        const iframe = document.createElement("iframe");
        iframe.src = url;
        iframe.allow = "camera; microphone; autoplay; display-capture; fullscreen";
        iframe.setAttribute("allowfullscreen", "true");
        holder.innerHTML = "";
        holder.appendChild(iframe);
        show("call");
      }

      async function startConversation() {
        try {
          const r = await fetch("/api/staffing/conversations", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(params),
          });
          const data = await r.json();
          if (!r.ok || !data.conversation_url) {
            throw new Error(data.error || "Failed to start interview");
          }
          conversationId = data.conversation_id;
          document.getElementById("roleLabel").textContent = data.role || "Screening Interview";
          document.getElementById("bar").classList.add("visible");
          embed(data.conversation_url);
          startPolling();
        } catch (e) {
          showError(e.message);
        }
      }

      async function pollSession() {
        if (!conversationId) return;
        try {
          const r = await fetch(
            `/api/staffing/tools?conversation_id=${encodeURIComponent(conversationId)}`
          );
          const data = await r.json();
          const s = data && data.session;
          if (!s) return;
          const stageEl = document.getElementById("stage");
          if (s.last_objective && STAGE_LABEL[s.last_objective]) {
            stageEl.textContent = STAGE_LABEL[s.last_objective];
          }
          if (s.status === "completed" || s.recruiter_call_scheduled) {
            document.getElementById("toast").classList.add("visible");
          }
          if (s.status === "ended" || s.status === "completed" || s.status === "disqualified") {
            clearInterval(pollTimer);
          }
        } catch (_) {}
      }

      function startPolling() {
        pollTimer = setInterval(pollSession, 3000);
      }

      // Forward any Daily.js perception tool calls from the iframe to our webhook.
      window.addEventListener("message", (ev) => {
        const data = ev.data || {};
        if (data && data.event_type === "conversation.tool_call" && conversationId) {
          fetch("/api/staffing/tools", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              conversation_id: conversationId,
              tool_name: data.tool_name || (data.tool && data.tool.name),
              tool_call_id: data.tool_call_id || "perception_" + Date.now(),
              parameters: data.arguments || data.parameters || {},
            }),
          }).catch(() => {});
        }
      });

      startConversation();
    </script>
  </body>
</html>
